<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Box Garage Activity Card | Kid Activity Lab</title>
    <meta name="description" content="Box Garage activity card for kids age 4-6: open a box, park cars, make spaces.">
    <link rel="canonical" href="https://kidactivitylab.com/cards/box-garage.html">
    <link rel="stylesheet" href="../styles.css?v=nav-stable-2">
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="Main navigation">
        <a class="brand" href="../index.html">Kid Activity Lab</a>
        <div class="nav-links">
          <a href="../index.html">Home</a>
          <a href="../original/">Original</a>
          <a href="../cards.html">Cards</a>
        </div>
      </nav>
    </header>

    <main class="card-shell">
      <article class="kid-card">
        <p class="kicker">5 min · age 4-6</p>
        <h1>Box Garage</h1>

        <div class="card-meta" aria-label="Activity details">
          <div class="meta-tile"><strong>Need</strong>small box</div>
          <div class="meta-tile"><strong>Need</strong>toy cars</div>
          <div class="meta-tile"><strong>Time</strong>5 min</div>
          <div class="meta-tile"><strong>Mess</strong>low</div>
        </div>

        <section class="steps-grid" aria-label="Steps">
          <div class="step-tile">
            <span class="step-number">1</span>
            <p>Open a box.</p>
          </div>
          <div class="step-tile">
            <span class="step-number">2</span>
            <p>Park cars.</p>
          </div>
          <div class="step-tile">
            <span class="step-number">3</span>
            <p>Make spaces.</p>
          </div>
          <div class="step-tile">
            <span class="step-number">4</span>
            <p>Drive out.</p>
          </div>
        </section>

        <section class="parent-strip" aria-label="Parent check">
          <strong>Parent check:</strong> Adult handles any cutting.
        </section>

        <section class="parent-strip" aria-label="Best for">
          <strong>Best for:</strong> pretend play, toy car storage, naming.
        </section>
      </article>
    </main>

    <footer class="site-footer">
      <p><a href="../cards.html">Back to activity cards</a></p>
    </footer>
  </body>
</html>
